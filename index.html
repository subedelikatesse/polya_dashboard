<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polya — English with Altana</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;800&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#5B3A4A;
    --paper:#FDF2F6;
    --pink:#F3A9C1;
    --pink-deep:#E87FA8;
    --lav:#C9B7E0;
    --card:#FFFFFF;
    --line:#F5DCE6;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    background-image: radial-gradient(circle at 90% 0%, #FBE1EC 0%, transparent 45%),
                       radial-gradient(circle at 0% 100%, #EFE3F7 0%, transparent 45%);
    color:var(--ink);
    font-family:'Manrope', sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  .wrap{max-width:640px;margin:0 auto;padding:36px 20px 60px;}

  .badge{
    background:linear-gradient(135deg, var(--pink) 0%, var(--pink-deep) 100%);
    color:#fff;
    border-radius:24px;
    padding:30px 26px 26px;
    position:relative;
    overflow:hidden;
    text-align:center;
  }
  .badge::before{
    content:"✿";
    position:absolute;
    font-size:120px;
    opacity:.15;
    top:-30px; right:-10px;
    font-family:'Unbounded',sans-serif;
  }
  .eyebrow{
    font-size:12px;
    letter-spacing:.14em;
    text-transform:uppercase;
    font-weight:700;
    opacity:.85;
    margin:0 0 6px;
  }
  .name{
    font-family:'Unbounded', sans-serif;
    font-weight:800;
    font-size:38px;
    margin:0;
    position:relative;
  }

  .section{margin-top:32px;}
  .section-title{
    font-family:'Unbounded', sans-serif;
    font-weight:600;
    font-size:18px;
    margin:0 0 4px;
    color:var(--pink-deep);
  }
  .section-sub{
    font-size:13px;
    color:#B98CA3;
    margin:0 0 14px;
  }

  .hw-note{
    background:var(--card);
    border:2px dashed var(--pink);
    border-radius:18px;
    padding:22px;
    text-align:center;
    font-size:16px;
    font-weight:600;
    color:var(--ink);
  }

  .links{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
  }
  @media (max-width:480px){ .links{grid-template-columns:1fr;} }
  .link-card{
    background:var(--card);
    border-radius:18px;
    padding:20px;
    text-decoration:none;
    color:var(--ink);
    box-shadow:0 2px 10px rgba(232,127,168,0.12);
    display:flex;
    flex-direction:column;
    gap:4px;
    transition:transform .15s ease;
    border:1px solid var(--line);
  }
  .link-card:hover{transform:translateY(-3px);}
  .link-name{font-weight:800;font-family:'Unbounded',sans-serif;font-size:15px;color:var(--pink-deep);}
  .link-desc{font-size:12.5px;color:#B98CA3;}

  .footer-note{
    text-align:center;
    font-size:12px;
    color:#C9A6B8;
    margin-top:36px;
  }
</style>
</head>
<body>

<div class="wrap">
  <div class="badge">
    <p class="eyebrow">English with Altana</p>
    <h1 class="name">Polya 🎀</h1>
  </div>

  <div class="section">
    <h2 class="section-title">Homework</h2>
    <p class="section-sub">Домашнее задание</p>
    <div class="hw-note">You can always find your homework on Progressme 🤓📝</div>
  </div>

  <div class="section">
    <h2 class="section-title">Links</h2>
    <p class="section-sub">Ссылки</p>
    <div class="links">
      <a class="link-card" href="https://progressme.ru/" target="_blank" rel="noopener">
        <div class="link-name">Progressme</div>
        <div class="link-desc">Schedule & homework</div>
      </a>
      <a class="link-card" href="https://wooordhunt.ru/" target="_blank" rel="noopener">
        <div class="link-name">Dictionary</div>
        <div class="link-desc">wooordhunt.ru</div>
      </a>
      <a class="link-card" href="https://online.flipbuilder.com/sdtta/kiiv/mobile/index.html#p=1" target="_blank" rel="noopener">
        <div class="link-name">Student's Book</div>
        <div class="link-desc">Textbook (online)</div>
      </a>
      <a class="link-card" href="https://online.flipbuilder.com/sdtta/uocg/mobile/index.html#p=1" target="_blank" rel="noopener">
        <div class="link-name">Workbook</div>
        <div class="link-desc">Exercises (online)</div>
      </a>
      <a class="link-card" href="https://canva.link/q6t3sg9yn8n9yi1" target="_blank" rel="noopener">
        <div class="link-name">Whiteboard</div>
        <div class="link-desc">Lesson board & audio</div>
      </a>
    </div>
  </div>

  <p class="footer-note">English with Altana 🌸</p>
</div>

</body>
</html>
