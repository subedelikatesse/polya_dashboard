<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polya — English with Altana</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;800&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1F2A3C;
    --paper:#FAF7F1;
    --gold:#E8B84B;
    --sage:#7C9885;
    --coral:#E4634F;
    --line:#DDD5C7;
    --card:#FFFFFF;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px);
    background-size: 100% 48px;
    color:var(--ink);
    font-family:'Manrope', sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:760px;margin:0 auto;padding:32px 20px 80px;}

  /* HERO / BADGE */
  .badge{
    background:var(--ink);
    color:var(--paper);
    border-radius:20px;
    padding:28px 28px 24px;
    position:relative;
    overflow:hidden;
  }
  .badge::before{
    content:"";
    position:absolute;
    top:-40px; right:-40px;
    width:160px;height:160px;
    border-radius:50%;
    background:radial-gradient(circle at 30% 30%, var(--gold), transparent 70%);
    opacity:0.35;
  }
  .eyebrow{
    font-size:12px;
    letter-spacing:.12em;
    text-transform:uppercase;
    color:var(--gold);
    font-weight:700;
    margin:0 0 6px;
  }
  .name{
    font-family:'Unbounded', sans-serif;
    font-weight:800;
    font-size:44px;
    line-height:1;
    margin:0 0 12px;
    position:relative;
  }
  .meta-row{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    position:relative;
  }
  .meta-pill{
    background:rgba(255,255,255,0.1);
    border:1px solid rgba(255,255,255,0.18);
    padding:6px 14px;
    border-radius:999px;
    font-size:14px;
    font-weight:600;
  }

  /* SECTION HEADERS */
  .section{margin-top:40px;}
  .section-head{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    gap:12px;
    margin-bottom:16px;
  }
  .section-title{
    font-family:'Unbounded', sans-serif;
    font-weight:600;
    font-size:22px;
    margin:0;
  }
  .section-sub{
    font-size:13px;
    color:#8A8578;
    margin:2px 0 0;
  }

  /* BEAM SCHEDULE */
  .beam-wrap{
    background:var(--card);
    border-radius:18px;
    padding:28px 20px 24px;
    box-shadow:0 1px 0 var(--line);
  }
  .beam{
    position:relative;
    height:8px;
    background:linear-gradient(90deg, var(--gold), var(--coral));
    border-radius:4px;
    margin:38px 8px 46px;
  }
  .beam-days{
    display:flex;
    justify-content:space-between;
  }
  .beam-day{
    position:relative;
    flex:1;
    text-align:center;
  }
  .beam-peg{
    width:14px;height:14px;
    border-radius:50%;
    background:var(--ink);
    border:3px solid var(--paper);
    position:absolute;
    top:-7px;
    left:50%;
    transform:translateX(-50%);
    box-shadow:0 0 0 2px var(--gold);
  }
  .beam-peg.off{
    background:var(--line);
    box-shadow:none;
    width:8px;height:8px;
    top:-4px;
  }
  .beam-label{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:.06em;
    color:#8A8578;
    margin-top:14px;
    font-weight:700;
  }
  .beam-time{
    font-family:'Unbounded', sans-serif;
    font-size:15px;
    font-weight:600;
    margin-top:4px;
  }
  .beam-topic{
    font-size:12px;
    color:#666;
    margin-top:2px;
    padding:0 4px;
  }

  /* HOMEWORK */
  .hw-card{
    background:var(--card);
    border-radius:18px;
    padding:22px 22px 18px;
    box-shadow:0 1px 0 var(--line);
  }
  .hw-item{
    display:flex;
    gap:12px;
    align-items:flex-start;
    padding:10px 0;
    border-bottom:1px solid #F0ECE3;
    font-size:15px;
    line-height:1.5;
  }
  .hw-item:last-child{border-bottom:none;}
  .hw-num{
    font-family:'Unbounded', sans-serif;
    color:var(--coral);
    font-weight:800;
    font-size:14px;
    min-width:22px;
  }
  .updated{
    font-size:12px;
    color:#A39E90;
    margin-top:14px;
  }

  /* LINKS */
  .links{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:14px;
  }
  @media (max-width:640px){ .links{grid-template-columns:1fr 1fr;} }
  @media (max-width:420px){ .links{grid-template-columns:1fr;} }
  .link-card{
    background:var(--card);
    border-radius:16px;
    padding:18px 20px;
    text-decoration:none;
    color:var(--ink);
    box-shadow:0 1px 0 var(--line);
    display:flex;
    flex-direction:column;
    gap:4px;
    transition:transform .15s ease;
  }
  .link-card:hover{transform:translateY(-2px);}
  .link-name{font-weight:800;font-family:'Unbounded',sans-serif;font-size:15px;}
  .link-desc{font-size:12.5px;color:#8A8578;}
  .link-empty{color:#B9B2A2;font-style:italic;font-size:13px;}

  /* EDIT MODE */
  .edit-toggle{
    position:fixed;
    bottom:20px;
    right:20px;
    background:var(--ink);
    color:var(--paper);
    border:none;
    border-radius:999px;
    padding:12px 20px;
    font-family:'Manrope',sans-serif;
    font-weight:700;
    font-size:14px;
    cursor:pointer;
    box-shadow:0 4px 16px rgba(0,0,0,.25);
  }
  .editor{
    background:var(--card);
    border-radius:18px;
    padding:20px;
    margin-top:16px;
    display:none;
    border:2px dashed var(--gold);
  }
  .editor.open{display:block;}
  .editor h4{margin:0 0 10px;font-family:'Unbounded',sans-serif;font-size:14px;}
  .editor label{display:block;font-size:12px;font-weight:700;color:#8A8578;margin:10px 0 4px;}
  .editor input, .editor textarea{
    width:100%;
    padding:8px 10px;
    border-radius:8px;
    border:1px solid var(--line);
    font-family:'Manrope',sans-serif;
    font-size:14px;
  }
  .editor textarea{min-height:70px;resize:vertical;}
  .editor-row{display:flex;gap:10px;}
  .editor-row > div{flex:1;}
  .save-btn{
    margin-top:14px;
    background:var(--coral);
    color:white;
    border:none;
    padding:10px 18px;
    border-radius:999px;
    font-weight:700;
    cursor:pointer;
    font-family:'Manrope',sans-serif;
  }
  .status-msg{font-size:12px;margin-top:8px;color:var(--sage);}
  .hw-add-btn, .link-add-btn{
    background:none;
    border:1px dashed var(--line);
    border-radius:8px;
    padding:6px 12px;
    font-size:12px;
    cursor:pointer;
    color:#8A8578;
    margin-top:8px;
  }
  .loading{padding:60px 20px;text-align:center;color:#8A8578;}
</style>
</head>
<body>

<div class="wrap" id="app">
  <div class="loading" id="loadingMsg">Loading… / Загрузка…</div>
</div>

<button class="edit-toggle" id="editToggle" style="display:none;">✎ Редактировать</button>

<script>
const STORAGE_KEY = 'polya-dashboard-v1';

const DEFAULT_DATA = {
  name: "Polya",
  age: 15,
  city: "Valencia",
  country: "Spain",
  origin: "Saint Petersburg",
  level: "A1–A2",
  schedule: [
    { day: "Mon", active: false, time: "", topic: "" },
    { day: "Tue", active: true,  time: "17:00", topic: "Solutions Elem. Unit 1" },
    { day: "Wed", active: true,  time: "17:00", topic: "Grammar + speaking" },
    { day: "Thu", active: true,  time: "17:00", topic: "Listening practice" },
    { day: "Fri", active: true,  time: "17:00", topic: "Review + speaking" },
    { day: "Sat", active: false, time: "", topic: "" },
    { day: "Sun", active: false, time: "", topic: "" }
  ],
  homework: [
    "Workbook Unit 1, ex. 1–3",
    "Learn 10 new words (family + hobbies)",
    "Record a 30-sec voice message: 'about me'"
  ],
  links: {
    progressme: "https://progressme.ru/",
    dictionary: "https://wooordhunt.ru/",
    studentBook: "https://online.flipbuilder.com/sdtta/kiiv/mobile/index.html#p=12",
    workbook: "https://online.flipbuilder.com/sdtta/uocg/mobile/index.html#p=8",
    board: "https://canva.link/q6t3sg9yn8n9yi1"
  },
  lastUpdated: ""
};

let data = null;

async function loadData(){
  try{
    const result = await window.storage.get(STORAGE_KEY, true);
    data = result ? JSON.parse(result.value) : DEFAULT_DATA;
  }catch(e){
    data = DEFAULT_DATA;
  }
  render();
}

async function saveData(){
  try{
    await window.storage.set(STORAGE_KEY, JSON.stringify(data), true);
    return true;
  }catch(e){
    return false;
  }
}

function render(){
  const app = document.getElementById('app');
  const d = data;

  const beamDays = d.schedule.map(s => `
    <div class="beam-day">
      <div class="beam-peg ${s.active ? '' : 'off'}"></div>
      <div class="beam-label">${s.day}</div>
      ${s.active ? `<div class="beam-time">${s.time || '—'}</div><div class="beam-topic">${s.topic || ''}</div>` : ''}
    </div>
  `).join('');

  const hwItems = d.homework.length
    ? d.homework.map((h,i) => `<div class="hw-item"><span class="hw-num">${String(i+1).padStart(2,'0')}</span><span>${h}</span></div>`).join('')
    : `<div class="hw-item"><span>No homework right now — enjoy the rest 🙂</span></div>`;

  const linkMeta = [
    { key: "progressme", name: "Progressme", desc: "Schedule & lessons" },
    { key: "dictionary", name: "Dictionary", desc: "wooordhunt.ru" },
    { key: "studentBook", name: "Student's Book", desc: "Textbook (online)" },
    { key: "workbook", name: "Workbook", desc: "Exercises (online)" },
    { key: "board", name: "Whiteboard", desc: "Lesson board & audio" }
  ];

  const linkCards = linkMeta.map(m => {
    const url = d.links[m.key];
    return url
      ? `<a class="link-card" href="${url}" target="_blank" rel="noopener">
          <div class="link-name">${m.name}</div>
          <div class="link-desc">${m.desc}</div>
        </a>`
      : `<div class="link-card"><div class="link-name">${m.name}</div><div class="link-empty">Link not added yet</div></div>`;
  }).join('');

  app.innerHTML = `
    <div class="badge">
      <p class="eyebrow">English with Altana</p>
      <h1 class="name">${d.name}</h1>
      <div class="meta-row">
        <span class="meta-pill">${d.age} y.o.</span>
        <span class="meta-pill">${d.city}, ${d.country}</span>
        <span class="meta-pill">Level ${d.level}</span>
      </div>
    </div>

    <div class="section">
      <div class="section-head">
        <div>
          <h2 class="section-title">This week's schedule</h2>
          <p class="section-sub">Расписание на неделю</p>
        </div>
      </div>
      <div class="beam-wrap">
        <div class="beam-days">${beamDays}</div>
      </div>
    </div>

    <div class="section">
      <div class="section-head">
        <div>
          <h2 class="section-title">Homework</h2>
          <p class="section-sub">Домашнее задание</p>
        </div>
      </div>
      <div class="hw-card">
        ${hwItems}
        <div class="updated">Updated: ${d.lastUpdated || '—'}</div>
      </div>
    </div>

    <div class="section">
      <div class="section-head">
        <div>
          <h2 class="section-title">Links</h2>
          <p class="section-sub">Ссылки</p>
        </div>
      </div>
      <div class="links">
        ${linkCards}
      </div>
    </div>

    <div class="editor" id="editorPanel">
      <h4>EDIT MODE</h4>

      <label>Уровень / Level</label>
      <input id="edit-level" value="${d.level}">

      <label>Homework (one line each)</label>
      <textarea id="edit-hw">${d.homework.join('\\n')}</textarea>

      <label>Progressme link</label>
      <input id="edit-progressme" value="${d.links.progressme}" placeholder="https://...">

      <label>Dictionary link</label>
      <input id="edit-dictionary" value="${d.links.dictionary || ''}" placeholder="https://...">

      <label>Student's Book link</label>
      <input id="edit-studentBook" value="${d.links.studentBook || ''}" placeholder="https://...">

      <label>Workbook link</label>
      <input id="edit-workbook" value="${d.links.workbook || ''}" placeholder="https://...">

      <label>Whiteboard link</label>
      <input id="edit-board" value="${d.links.board}" placeholder="https://...">

      <h4 style="margin-top:18px;">Schedule</h4>
      ${d.schedule.map((s,i) => `
        <div class="editor-row" style="margin-bottom:6px;">
          <div style="max-width:60px;"><label>${s.day}</label>
            <input type="checkbox" id="edit-active-${i}" ${s.active ? 'checked' : ''}></div>
          <div><label>Time</label><input id="edit-time-${i}" value="${s.time}"></div>
          <div><label>Topic</label><input id="edit-topic-${i}" value="${s.topic}"></div>
        </div>
      `).join('')}

      <button class="save-btn" id="saveBtn">Save changes</button>
      <div class="status-msg" id="statusMsg"></div>
    </div>
  `;

  document.getElementById('saveBtn').onclick = onSave;
}

async function onSave(){
  const statusMsg = document.getElementById('statusMsg');
  statusMsg.textContent = 'Saving…';

  data.level = document.getElementById('edit-level').value;
  data.homework = document.getElementById('edit-hw').value.split('\\n').map(s=>s.trim()).filter(Boolean);
  data.links.progressme = document.getElementById('edit-progressme').value.trim();
  data.links.dictionary = document.getElementById('edit-dictionary').value.trim();
  data.links.studentBook = document.getElementById('edit-studentBook').value.trim();
  data.links.workbook = document.getElementById('edit-workbook').value.trim();
  data.links.board = document.getElementById('edit-board').value.trim();

  data.schedule = data.schedule.map((s,i) => ({
    day: s.day,
    active: document.getElementById(`edit-active-${i}`).checked,
    time: document.getElementById(`edit-time-${i}`).value,
    topic: document.getElementById(`edit-topic-${i}`).value
  }));

  data.lastUpdated = new Date().toLocaleDateString('ru-RU', { day:'numeric', month:'long' });

  const ok = await saveData();
  statusMsg.textContent = ok ? 'Saved ✓' : 'Save failed — try again';
  render();
  if(document.getElementById('editorPanel')) document.getElementById('editorPanel').classList.add('open');
}

document.getElementById('editToggle').addEventListener('click', () => {
  const panel = document.getElementById('editorPanel');
  if(panel) panel.classList.toggle('open');
});

loadData().then(() => {
  document.getElementById('editToggle').style.display = 'block';
});
</script>

</body>
</html>
